server:
  port: 8080

spring:
  application:
    name: back-end

  datasource:
    url: jdbc:mysql://localhost:3306/hospital_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 添加这部分：SQL 初始化配置
  sql:
    init:
      mode: always                    # 每次启动都执行
      continue-on-error: true        # 出错继续执行
      schema-locations: classpath:table.sql    # 表结构脚本
      data-locations: classpath:data.sql        # 数据脚本
      encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto